# GoReleaser configuration
# https://goreleaser.com/customization/

project_name: inotify-watcher

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/cdryzun/inotify-watcher/cmd.Version={{.Version}}
      - -X github.com/cdryzun/inotify-watcher/cmd.GitCommit={{.ShortCommit}}
      - -X github.com/cdryzun/inotify-watcher/cmd.BuildTime={{.Date}}
    flags:
      - -trimpath

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - deploy/**

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Performance improvements'
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: your-org
    name: inotify-watcher
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## TrueNAS Artifact Inotify Hook {{ .Tag }}

    A high-performance file system monitoring tool for Linux using inotify.

    ### Changes since {{ .PreviousTag }}

    See the [CHANGELOG.md](CHANGELOG.md) for more details.

  footer: |
    **Full Changelog**: https://github.com/your-org/inotify-watcher/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Installation

    ### Download Binary

    Download the appropriate binary for your platform from the assets below.

    ### Using Go

    ```bash
    go install github.com/cdryzun/inotify-watcher@{{ .Tag }}
    ```

    ### Deploy to TrueNAS

    ```bash
    tar -xzf inotify-watcher-{{ .Tag }}-linux-amd64.tar.gz
    scp inotify-watcher root@truenas:/usr/local/bin/
    ssh root@truenas chmod +x /usr/local/bin/inotify-watcher
    ```

    ## Documentation

    - [README](https://github.com/your-org/inotify-watcher#readme)
    - [Usage Guide](https://github.com/your-org/inotify-watcher#usage)
    - [Contributing](https://github.com/your-org/inotify-watcher/blob/main/CONTRIBUTING.md)

    ## Support

    If you encounter any issues, please [open an issue](https://github.com/your-org/inotify-watcher/issues).

    ---

    Thanks to all contributors! 🎉
